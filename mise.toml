[tools]
go = "latest"
gofumpt = "latest"
golangci-lint = "latest"
pre-commit = "latest"
"go:golang.org/x/tools/cmd/godoc" = "latest"

[env]
# Styles
S_RESET = "\u001b[0m"
S_BOLD = "\u001b[1m"
S_URL = "\u001b[4m"

# Colors
C_RED = "\u001b[31m"
C_GREEN = "\u001b[32m"
C_MAGENTA = "\u001b[35m"
C_BLUE = "\u001b[34m"

# Hyperlink Parts
LINK_START = "\u001b]8;;"
LINK_SEP = "\u001b\\"
LINK_END = "\u001b]8;;\u001b\\"

[tasks.init]
description = "Install hooks and setup environment"
run = "pre-commit install"

[tasks.pre-commit]
description = "Run pre-commit"
run = "pre-commit run --all-files"

[tasks.fmt]
description = "Format Go files"
quiet = true
usage = """
arg "<path>" help="path to run the formatter on"
flag "-w --write" help="Write result to (source) files instead of stdout"
flag "-d --diff"  help="Display diffs instead of rewriting files"
"""
run = """
if [ "$usage_write" = "true" ]; then
  gofumpt -w ${usage_path}
elif [ "$usage_diff" = "true" ]; then
  gofumpt -d ${usage_path}
else
  gofumpt ${usage_path}
fi
"""

[tasks.lint]
description = "Lint Go files"
quiet = true
run = "golangci-lint run"

[tasks.docs]
description = "Serve godoc at http://localhost:6060"
quiet = true
run = '''
URL="http://localhost:6060/pkg/github.com/necrom4/sbb-tui/"
echo "Open ${LINK_START}${URL}${LINK_SEP}${URL}${LINK_END}"
godoc -http=:6060
'''

[[hooks.enter]]
# Verify all tools defined in [tools] are actually installed
script = """
tools=$(mise config get tools | cut -d' ' -f1)

missing=""
for tool in $tools; do
  if ! mise which "$tool" > /dev/null 2>&1; then
    missing="$missing $tool"
  fi
done

if [ -n "$missing" ]; then
  echo "${C_RED}[WARNING]${S_RESET}"
  echo "Tools defined in mise.toml are not installed: ${C_MAGENTA}$missing${S_RESET}"
  echo "Run '${C_GREEN}mise install${S_RESET}' to set up your environment."
fi
"""

[[hooks.enter]]
script = """
if [ ! -f ".git/hooks/pre-commit" ] || ! grep -q "pre-commit" ".git/hooks/pre-commit"; then
  echo "${C_RED}[WARNING]${S_RESET}"
  echo "Git pre-commit ${C_MAGENTA}hooks${S_RESET} not initialized!"
  echo "Run '${C_GREEN}mise run init${S_RESET}' to enable pre-commit hooks."
fi
"""
